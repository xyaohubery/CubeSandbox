oom_score = 0
root = "/data/cubelet/root"
#独立空间 存放元数据
#mount -t tmpfs -o size=500m none /data/cubelet/state/
state = "/data/cubelet/state"
version = 3
pid_file = "/run/cube-let.pid"
dynamic_config_path = "/usr/local/services/cubetoolbox/Cubelet/dynamicconf/conf.yaml"

[http]
  address = ":9998"

[timeouts]
  "io.containerd.timeout.bolt.open" = "3s"
  "io.containerd.timeout.task.state" = "2s"
  "io.containerd.timeout.shim.shutdown" = "5m"
  "io.containerd.timeout.shim.cleanup" = "5s"
  "io.containerd.timeout.shim.load" = "5s"
[grpc]
  address = "/data/cubelet/cubelet.sock"
  gid = 0
  max_recv_message_size = 16777216
  max_send_message_size = 16777216
  tcp_address = ":9999"
  uid = 0
[cubetap]
  address="/data/cubelet/cubetap.sock"
  gid = 0
  uid = 0
[operation_server]
  address="/data/cubelet/cubelet-operation.sock"
  gid = 0
  uid = 0
  disable = true
[debug]
  address = ":9966"
[plugins]
  [plugins."io.cubelet.internal.v1.volume"]
  [plugins."io.cubelet.internal.v1.shimlog"]
    #独立空间
    #mount -t tmpfs -o size=100m none /data/cubelet/shimlog
    root_path = "/data/cubelet/shimlog"
  [plugins."io.cubelet.internal.v1.cleanup"]
    #独立空间
    #mount -t tmpfs -o size=100m none /data/cubelet/cleanup
    root_path = "/data/cubelet/cleanup"
  [plugins."io.cubelet.internal.v1.cgroup"]
    pool_size = 3000
    pool_workers = 1
    pool_trigger_interval_in_ms = 1000
    vm_cpu_overhead = "0"
    vm_memory_overhead_base = "42Mi"
    vm_memory_overhead_coefficient = 64
    host_cpu_overhead = "0.3"
    host_memory_overhead_base = "20Mi"
    vm_snapshot_specs_config = "/usr/local/services/cubetoolbox/cube-snapshot/spec.json"
    snapshot_disk_dir = "/data/snapshot_pack/disks"

  [plugins."io.cubelet.internal.v1.network"]
    object_dir = "/usr/local/services/cubetoolbox/cube-vs/network"
    eth_name = "eth0"
    tap_init_num = 500
    cidr = "192.168.0.0/18"
    mvm_inner_ip = "169.254.68.6"
    mvm_mac_addr = "20:90:6f:fc:fc:fc"
    mvm_gw_mac_addr = "20:90:6f:cf:cf:cf"
    mvm_gw_dest_ip = "169.254.68.5"
    mvm_mtu = 1300
    # metric
    check_interval_in_sec = "5s"
    report_stat_interval_in_sec = "60s"
    # cubevs event from redis stream
    watch_stream = false
    redis_conf_path = "/data/cubelet/rainbow.toml"
    stream_name_prefix = "gw_route:update:"
    stream_key = "gw_key"
    stream_block_time = "30s"
    # network-agent
    enable_network_agent = true
    network_agent_endpoint = "grpc+unix:///tmp/cube/network-agent-grpc.sock"
    network_agent_tap_socket = "/tmp/cube/network-agent-tap.sock"
    network_agent_init_timeout = "120s"
    network_agent_retry_interval = "1s"

  [plugins."io.cubelet.internal.v1.storage"]
    #root_path=/data/cubelet/state/io.cubelet.internal.v1.storage
    #独立磁盘
    data_path = "/data/cubelet/storage"
    #默认普通cp模式 copy
    pool_type = "copy_reflink"
    disksize = "400Gi"
    warningPercent = 200
    pool_default_format_size_list = ["1Gi"]
    base_disk_uuid = "ef5c2893-ddbd-4d6e-bef6-3853c31d5b94"
    pool_size = 3000
    pool_worker_num = 8
    pool_trigger_interval_in_ms = 800
    snapshot_base_path="/data/cube-shim/disks"
    snapshot_format_size_list = ["512Mi"]
    snapshot_format_num = 1
  [plugins."io.cubelet.internal.v1.images"]
    runtime_type = "io.containerd.cube.v2"
  [plugins."io.cubelet.internal.v1.cubebox"]
    default_runtime_name = "cube"
    [plugins."io.cubelet.internal.v1.cubebox".runtimes]
      [plugins."io.cubelet.internal.v1.cubebox".runtimes.cube]
        runtime_type = "io.containerd.cube.rs"
        runtime_cfg_path = "/usr/local/services/cubetoolbox/cube-shim/conf/config-cube.toml"
      [plugins."io.cubelet.internal.v1.cubebox".runtimes.runc]
        runtime_type = "io.containerd.runc.v2"
    #cube_host_shared_dir = "/run/cube-containers/shared/sandboxes/"
    cubetool_base_dir = "/usr/local/services/cubetoolbox"
  [plugins."io.cubelet.cubebox-service.v1.cubebox-service"]
    destroy_dead_line = "60s"
    dead_container_ttl = "1h"
  [plugins."io.cubelet.images-service.v1.images-service"]
    [plugins."io.cubelet.images-service.v1.images-service".image_gc]
      max_unused_time_interval = "1d"
      detection_interval = "1m"
      max_deletion_per_cycle = 10
      free_disk_threshold_percent = 10
  [plugins."io.cubelet.internal.v1.gc-service"]
    gc_interval = "30s"
    cleanup_interval = "5s"

  [plugins."io.cubelet.workflow.v1.workflow"]
    [plugins."io.cubelet.workflow.v1.workflow".flows]
      [plugins."io.cubelet.workflow.v1.workflow".flows.init]
        actions = [["cleanup"],["cubebox"],["images","storage","cgroup","network","volume", "netfile", "cube-sandbox-store"]]
      [plugins."io.cubelet.workflow.v1.workflow".flows.create]
        concurrent = 100
        actions = [["createid", "appsnapshot"],["images","volume","storage","network","netfile", "cube-sandbox-store"],["cgroup"],["cubebox"]]
      [plugins."io.cubelet.workflow.v1.workflow".flows.destroy]
        concurrent = 100
        actions = [["cubebox"],["images","storage","cgroup","network","volume","netfile", "cube-sandbox-store"],["cleanup"]]
      [plugins."io.cubelet.workflow.v1.workflow".flows.cleanup]
        actions = [["cubebox"],["images","volume","storage","cgroup","network","netfile", "cube-sandbox-store"],["cleanup"]]
  [plugins."io.containerd.gc.v1.scheduler"]
    deletion_threshold = 0
    mutation_threshold = 1000
    pause_threshold = 0.0001
    schedule_delay = "0s"
    startup_delay = "5s"

  [plugins."io.containerd.snapshotter.v1.overlayfs"]
    #独立空间 存放metada
    #mount -t tmpfs -o size=300m none /data/cubelet/state/
    root_path = "/data/cubelet/state"
    #独立空间 存放镜像unpack数据和snashot数据
    data_path = "/data/cubelet/root"

  [plugins."io.containerd.metadata.v1.bolt"]
    #独立空间
    #mount -t tmpfs -o size=300m none /data/cubelet/state/
    root_path = "/data/cubelet/state"
    content_sharing_policy = "shared"
    no_sync = true

  [plugins."io.containerd.monitor.v1.cgroups"]
    no_prometheus = false
  [plugins."io.containerd.runtime.v2.task"]
    platforms = ["linux/amd64"]
    sched_core = false
  [plugins."io.cubelet.chi.v1.vsocket-manager"]
    proxyPort = 1032
  [plugins."io.containerd.cri.v1.images"]
    max_concurrent_downloads = 10
    stats_collect_period = 30
    [plugins."io.containerd.cri.v1.images".registry.mirrors]
      [plugins."io.containerd.cri.v1.images".registry.mirrors."docker.io"]
        endpoint = ["https://mirror.ccs.tencentyun.com"]


