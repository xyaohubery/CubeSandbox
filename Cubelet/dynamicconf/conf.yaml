common:
  enable_pf_mode: false
  sandbox_exec_cmd_time_out: 5s
  enable_sandbox_exec_cmd_before_exist: false
  sandbox_exec_cmd_before_exist_log_out: false
  sandbox_exec_cmd_before_exist:
   - sh 
   - "/usr/local/cubetools/cube_exec_cmd_before_exist.sh"
  cgroup_set_memory_reparent_file: ""
  disable_host_cgroup: true
  # 禁用传统的netfile
  disable_host_netfile: true
  # guest 容器默认 DNS，模板/请求中的 dns_config.servers 优先于这里
  default_dns_servers:
    - 119.29.29.29

host:
  scheduler_label: "default-cluster"
  quota:
    mcpu_limit: 0
    mem_limit: ""
    mvm_limit: 0
    creation_concurrent_num: 0
  gc:
    code_expiration_time: "72h"
    image_expiration_time: "24h"

meta_server_config:
  meta_server_endpoint: "127.0.0.1:8089"
  node_status_max_images: 40000
